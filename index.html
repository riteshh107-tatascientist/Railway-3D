<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RailAI – Smart Railway System</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* 🚉 STATION BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://images.unsplash.com/photo-1617096200347-cb04c6bfb6e6?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  filter: brightness(0.4);
  z-index: 0;
}

/* 🚆 TRAIN IMAGE OVERLAY (OPTIONAL VISUAL BOOST) */
.train-bg {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 250px;
  object-fit: cover;
  opacity: 0.6;
  z-index: 1;
}

/* 🎯 HEADER */
.header {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  color: #00ffe5;
  font-size: 40px;
  font-weight: bold;
  text-shadow: 0 0 20px cyan;
  z-index: 10;
}

/* 🧊 UI PANEL */
.panel {
  position: absolute;
  top: 120px;
  left: 30px;
  width: 280px;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border: 1px solid cyan;
  backdrop-filter: blur(10px);
  border-radius: 15px;
  color: white;
  z-index: 10;
}

button {
  padding: 10px;
  width: 100%;
  background: cyan;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

/* canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 2;
}
</style>
</head>

<body>

<!-- 🚉 REAL STATION BACKGROUND -->
<div id="bg"></div>

<!-- OPTIONAL TRAIN IMAGE LAYER -->
<img class="train-bg"
src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Indian_Railways_train.jpg">

<div class="header">
🚆 RailAI Smart Railway System
</div>

<div class="panel">
<h3>Live Control Panel</h3>
<p>Status: ACTIVE</p>
<button onclick="alert('Tracking Started')">Start Tracking</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ---------------- SCENE ---------------- */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

camera.position.set(0, 2, 8);

/* ---------------- RENDERER ---------------- */
const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ---------------- LIGHT ---------------- */
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

/* ---------------- TRACK ---------------- */
const track = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 3),
  new THREE.MeshStandardMaterial({ color: 0x222222 })
);

track.rotation.x = -Math.PI/2;
track.position.y = -1;
scene.add(track);

/* ---------------- TRAIN ---------------- */
const train = new THREE.Group();

const engine = new THREE.Mesh(
  new THREE.BoxGeometry(3,1,1.5),
  new THREE.MeshStandardMaterial({ color: 0xff8c00 })
);

const cabin = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,1,1.5),
  new THREE.MeshStandardMaterial({ color: 0x333333 })
);

cabin.position.x = -2;

train.add(engine);
train.add(cabin);

scene.add(train);

/* ---------------- ANIMATION ---------------- */
function animate(){
  requestAnimationFrame(animate);

  train.position.z -= 0.1;

  if(train.position.z < -30){
    train.position.z = 10;
  }

  renderer.render(scene,camera);
}

animate();

/* ---------------- RESIZE ---------------- */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
